<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru</title>
    <style>
        body { background-color: #1a2639; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #25334a; width: 100%; max-width: 450px; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header { background: #c5a059; padding: 15px; font-weight: bold; font-size: 18px; color: #fff; text-align: center; text-transform: uppercase; }
        form { padding: 20px; }
        .section-title { padding-left: 10px; margin: 20px 0 10px; font-size: 14px; font-weight: bold; text-transform: uppercase; color: #c5a059; border-left: 3px solid #c5a059; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #fff; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 3px; border: 1px solid #444; background: #fff; color: #333; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .hint { font-size: 11px; color: #aaa; margin-bottom: 12px; display: block; }
        .checkbox-container { text-align: center; margin: 20px 0; font-size: 13px; }
        .checkbox-container input { width: auto; margin: 0 auto 10px auto; display: block; }
        .btn-submit { background-color: #5c7cfa; color: white; border: none; padding: 14px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase; }
        
        /* Style untuk halaman sukses */
        #successSection { display: none; text-align: center; background: white; color: #333; padding: 30px 15px; }
        #successSection img { width: 100%; max-width: 300px; margin: 15px 0; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div id="formSection">
        <div class="header">DAFTAR AKUN BARU</div>
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="c74c4a87-2a3b-4a2f-9483-f9b48f23981d">
            <input type="hidden" name="redirect" value="https://gamestar388-sketch.github.io/nesiabetting/#done">
            
            <div class="section-title">Rincian Akun</div>
            <label>Nama Pengguna</label>
            <input type="text" name="username" required>
            <span class="hint">* Nama akun 6-12 karakter</span>
            
            <label>Kata Sandi</label>
            <input type="password" name="password" required>
            <span class="hint">* Minimal 8 karakter (huruf & angka)</span>

            <div class="section-title">Kontak Info</div>
            <label>Alamat Email</label>
            <input type="email" name="email" required>
            <div style="margin-bottom:15px;"></div>

            <label>WA / Nomor Telepon</label>
            <input type="number" name="whatsapp" required>

            <div class="section-title">Informasi Bank</div>
            <label>Nama Sesuai Rekening</label>
            <input type="text" name="nama_rekening" required>
            <div style="margin-bottom:15px;"></div>
            
            <label>Bank</label>
            <select name="bank" required>
                <option value="" disabled selected>- Pilih Bank -</option>
                <option value="BCA">BCA</option>
                <option value="BRI">BRI</option>
                <option value="BNI">BNI</option>
                <option value="MANDIRI">MANDIRI</option>
                <option value="BANK JAGO">BANK JAGO</option>
                <option value="SEABANK">SEABANK</option>
                <option value="ALLO BANK">ALLO BANK</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
                <option value="GOPAY">GOPAY</option>
                <option value="SHOPEEPAY">SHOPEEPAY</option>
            </select>
            <div style="margin-bottom:15px;"></div>

            <label>No. Rekening / HP</label>
            <input type="number" name="nomor_rekening" required>

            <div class="checkbox-container">
                <input type="checkbox" required checked>
                <span>Saya berusia 18 tahun atau lebih.</span>
            </div>

            <button type="submit" class="btn-submit">DAFTAR SEKARANG</button>
        </form>
    </div>

    <div id="successSection">
        <h2 style="color: #2ecc71;">PENDAFTARAN BERHASIL!</h2>
        <p>Silakan Scan QRIS di bawah ini untuk Deposit:</p>
        
        <img src="https://raw.githubusercontent.com/gamestar388-sketch/nesiabetting/refs/heads/main/photo_6280731278143328320_y.jpg" alt="QRIS Nemoshop">
        
        <p style="font-weight: bold;">Setelah transfer, konfirmasi ke Admin via WhatsApp.</p>
        <button onclick="window.location.href='index.html'" style="padding: 10px; cursor: pointer; width: 100%;">Kembali ke Depan</button>
    </div>
</div>

<script>
    if(window.location.hash === '#done') {
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successSection').style.display = 'block';
    }
</script>

</body>
</html>
