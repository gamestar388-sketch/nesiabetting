<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Turnamen</title>
    <style>
        body { background-color: #1a2639; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #25334a; width: 100%; max-width: 450px; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .header { background: #c5a059; padding: 15px; font-weight: bold; font-size: 16px; color: #fff; text-align: center; }
        form { padding: 20px; }
        .section-title { border-left: 3px solid #c5a059; padding-left: 10px; margin: 20px 0 10px; font-size: 14px; font-weight: bold; text-transform: uppercase; color: #c5a059; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #fff; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 5px; border: 1px solid #444; background: #fff; color: #333; border-radius: 4px; box-sizing: border-box; }
        .hint { font-size: 11px; color: #bdc3c7; margin-bottom: 15px; line-height: 1.4; }
        .btn-submit { background-color: #5c7cfa; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        /* Halaman Sukses */
        #successSection { display: none; text-align: center; background: white; color: #333; padding: 30px 15px; }
        #successSection img { width: 100%; max-width: 280px; margin: 15px 0; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div id="formSection">
        <div class="header">DAFTAR AKUN BARU</div>
        
        <form action="https://api.web3forms.com/submit" method="POST" id="pendaftaranForm">
            <form action="https://api.web3forms.com/submit" method="POST" id="pendaftaranForm">
            <input type="hidden" name="access_key" value="c74c4a87-2a3b-4a2f-9483-f9b48f23981d">
            
            <input type="checkbox" name="botcheck" style="display: none;">

            <input type="hidden" name="redirect" value="https://gamestar388-sketch.github.io/nesiabetting/#done">

            <div class="section-title">Rincian Akun</div>
            <label>Nama Pengguna</label>
            <input type="text" name="user_id" required>
            <div class="hint">* Nama akun 6-12 karakter</div>

            <label>Kata Sandi</label>
            <input type="password" name="secure_key" required> 
            <div class="hint">* Minimal 8 karakter (huruf & angka)</div>

            <div class="section-title">Kontak Info</div>
            <label>Alamat Email</label>
            <input type="email" name="email" required>

            <label>WA / Nomor Telepon</label>
            <input type="number" name="contact_wa" required>

            <div class="section-title">Informasi Bank</div>
            <label>Nama Sesuai Rekening</label>
            <input type="text" name="sender_name" required>

            <label>Bank</label>
            <select name="bank_type" required>
                <option value="">- Pilih Bank -</option>
                <option value="BCA">BCA</option>
                <option value="BRI">BRI</option>
                <option value="MANDIRI">MANDIRI</option>
                <option value="DANA">DANA</option>
                <option value="OVO">OVO</option>
            </select>

            <label>No. Rekening / HP</label>
            <input type="number" name="account_number" required>

            <div style="font-size: 12px; margin-top: 15px;">
                <input type="checkbox" required> Saya berusia 18 tahun atau lebih.
            </div>

            <button type="submit" class="btn-submit">DAFTAR SEKARANG</button>
        </form>
    </div>

    <div id="successSection" style="display: none; text-align: center; background: white; color: #333; padding: 30px 15px; border-radius: 8px; margin-top: 20px;">
        <h2 style="color: #2ecc71;">PENDAFTARAN BERHASIL!</h2>
        <p>Silakan Scan QRIS di bawah ini untuk Deposit:</p>
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiwK9Y-a6-C4B86lKqP2L29XzG09S3k7M2N7x5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y5z5Y/s1600/QRIS_Nemoshop.jpg" alt="QRIS" style="width: 100%; max-width: 280px; margin: 15px 0; border: 1px solid #ccc;">
        <p style="font-weight: bold;">Setelah transfer, konfirmasi ke Admin WA.</p>
        <button onclick="window.location.href='index.html'" style="padding: 10px; cursor: pointer; background: #5c7cfa; color: white; border: none; border-radius: 4px;">Kembali ke Depan</button>
    </div>
</div>

<script>
    // Logika agar QRIS muncul otomatis jika ada kode #done di link
    if(window.location.hash === '#done') {
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successSection').style.display = 'block';
    }
</script>

</body>
</html>
